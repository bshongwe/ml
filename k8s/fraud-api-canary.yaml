apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api-canary
  namespace: production
  labels:
    app: fraud-api
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-api
      version: canary
  template:
    metadata:
      labels:
        app: fraud-api
        version: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: fraud-api
      containers:
      - name: fraud-api
        image: ${ECR_REGISTRY}/fraud-api:canary
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_VERSION
          value: "canary"
        - name: ANOMALY_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: fraud-api-config
              key: anomaly_threshold
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: fraud-api-config
              key: redis_host
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-api-canary
  namespace: production
  labels:
    app: fraud-api
    version: canary
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
  selector:
    app: fraud-api
    version: canary
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: fraud-api
  namespace: production
spec:
  hosts:
  - fraud-api.production.svc.cluster.local
  http:
  - match:
    - headers:
        x-canary:
          exact: "true"
    route:
    - destination:
        host: fraud-api-canary
        port:
          number: 80
  - route:
    - destination:
        host: fraud-api
        port:
          number: 80
      weight: 90
    - destination:
        host: fraud-api-canary
        port:
          number: 80
      weight: 10
