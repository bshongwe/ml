apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  fraud-detection-dashboard.json: |
    {
      "dashboard": {
        "title": "Fraud Detection ML Platform",
        "panels": [
          {
            "title": "Prediction Rate (RPS)",
            "targets": [
              {
                "expr": "rate(model_predictions_total{model=\"fraud_detector\"}[5m])"
              }
            ]
          },
          {
            "title": "P95 Latency",
            "targets": [
              {
                "expr": "model_latency_ms{model=\"fraud_detector\",quantile=\"0.95\"}"
              }
            ]
          },
          {
            "title": "Error Rate",
            "targets": [
              {
                "expr": "rate(model_errors_total{model=\"fraud_detector\"}[5m])"
              }
            ]
          },
          {
            "title": "Mean Prediction Score",
            "targets": [
              {
                "expr": "model_prediction_mean{model=\"fraud_detector\"}"
              }
            ]
          },
          {
            "title": "Feature Drift Detected",
            "targets": [
              {
                "expr": "feature_drift_detected{model=\"fraud_detector\"}"
              }
            ]
          },
          {
            "title": "Model Version Distribution",
            "targets": [
              {
                "expr": "count by (version) (model_predictions_total{model=\"fraud_detector\"})"
              }
            ]
          }
        ],
        "refresh": "30s",
        "time": {
          "from": "now-1h",
          "to": "now"
        }
      }
    }
